<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5조 '건설재해사례조사' | 인터랙티브 안전 진단 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Galmuri11:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mc: { textYellow: '#FFFF55', textGreen: '#55FF55' }
                    },
                    fontFamily: {
                        sans: ['Galmuri11', 'sans-serif'],
                        pixel: ['"Press Start 2P"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Galmuri11', sans-serif; background-color: #141414; color: #FFFFFF; overflow-x: hidden; min-height: 100vh; }
        body::before { content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-image: url('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=2070&auto=format&fit=crop'); background-size: cover; z-index: -2; }
        body::after { content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(4px); z-index: -1; }
        .card-custom { background-color: #8B8B8B; border: 4px solid #373737; border-top-color: #FFF; border-left-color: #FFF; box-shadow: inset -4px -4px 0px #555555; transition: all 0.15s; }
        .card-custom:hover { background-color: #C6C6C6; border-color: #FFFFFF; border-top-color: #373737; border-left-color: #373737; box-shadow: inset -4px -4px 0px #8B8B8B, 0px 0px 12px #FFFF55; transform: scale(1.02); }
        .mc-shadow { text-shadow: 2px 2px 0px #3F3F3F; }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased">

    <header class="border-b-4 border-black bg-neutral-900 sticky top-0 z-40 py-3 px-6 flex justify-between items-center shadow-lg">
        <div class="flex items-center space-x-3">
            <div class="h-10 w-10 bg-emerald-700 border-2 border-black flex items-center justify-center text-white font-pixel text-xl cursor-pointer">5</div>
            <div>
                <h1 class="font-bold text-lg text-white mc-shadow">5조 '건설재해사례조사'</h1>
                <p class="text-[10px] text-zinc-400 font-pixel">SAFETY INTERACTIVE SIMULATOR</p>
            </div>
        </div>
        <!-- 음악 제어 버튼 -->
        <button id="bgm-btn" onclick="initAudio()" class="text-[10px] font-pixel border-4 border-neutral-700 bg-black px-4 py-2 text-mc-textYellow hover:text-white hover:bg-neutral-800 transition-all mc-shadow">
            🎵 BGM: START
        </button>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 space-y-6">
        <div class="text-center max-w-3xl mx-auto space-y-3 pt-4">
            <h2 class="text-2xl md:text-3xl font-bold text-white mc-shadow">과거의 실패에서 배우는 안전 시스템</h2>
        </div>

        <!-- 생략된 본문 내용은 기존과 동일하게 구성 가능 -->
    </main>

    <script>
        let audioCtx = null;
        let isBgmPlaying = false;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if (!isBgmPlaying) {
                playUpbeatBGM();
                document.getElementById('bgm-btn').innerText = "🎵 BGM: PLAYING";
            }
        }

        // [활기찬 8비트 음악 엔진]
        function playUpbeatBGM() {
            isBgmPlaying = true;
            const melody = [
                { f: 523.25, d: 0.15 }, { f: 659.25, d: 0.15 }, { f: 783.99, d: 0.15 }, { f: 1046.50, d: 0.3 },
                { f: 932.33, d: 0.15 }, { f: 783.99, d: 0.15 }, { f: 659.25, d: 0.15 }, { f: 523.25, d: 0.3 }
            ];
            let i = 0;

            function loop() {
                if (!isBgmPlaying) return;
                const note = melody[i % melody.length];
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'square'; // 8비트 느낌의 사각파
                osc.frequency.setValueAtTime(note.f, audioCtx.currentTime);
                
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + note.d);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + note.d);

                i++;
                setTimeout(loop, note.d * 1000 + 50);
            }
            loop();
        }

        function playClickSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }
    </script>
</body>
</html>
