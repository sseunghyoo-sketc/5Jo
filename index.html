<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5조 '건설재해사례조사' | 인터랙티브 안전 진단 시스템</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Galmuri11:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mc: {
                            bg: '#141414',
                            gui: '#C6C6C6',
                            guiDark: '#2C2C2C',
                            borderLight: '#FFFFFF',
                            borderDark: '#555555',
                            textYellow: '#FFFF55',
                            textGreen: '#55FF55',
                            textShadow: '#3F3F3F'
                        }
                    },
                    fontFamily: {
                        sans: ['Galmuri11', 'sans-serif'],
                        pixel: ['"Press Start 2P"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Galmuri11', sans-serif; color: #FFFFFF; overflow-x: hidden; position: relative; min-height: 100vh; background-color: #141414; }
        body::before { content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-image: url('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center; background-repeat: no-repeat; z-index: -2; }
        body::after { content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(4px); z-index: -1; }
        .card-custom { background-color: #8B8B8B; border: 4px solid #373737; border-top-color: #FFF; border-left-color: #FFF; image-rendering: pixelated; transition: all 0.15s ease-in-out; box-shadow: inset -4px -4px 0px #555555; }
        .card-custom:hover { background-color: #C6C6C6; border-color: #FFFFFF; border-top-color: #373737; border-left-color: #373737; box-shadow: inset -4px -4px 0px #8B8B8B, 0px 0px 12px #FFFF55; transform: scale(1.02); }
        .mc-shadow { text-shadow: 2px 2px 0px #3F3F3F; }
        .mc-shadow-yellow { text-shadow: 2px 2px 0px #3F3F00; }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased">

    <!-- HUD Header -->
    <header class="border-b-4 border-black bg-neutral-900 sticky top-0 z-40 py-3 px-6 flex justify-between items-center shadow-lg">
        <div class="flex items-center space-x-3">
            <div onclick="playClickSound()" class="h-10 w-10 bg-gradient-to-br from-green-600 to-emerald-800 border-2 border-black flex items-center justify-center text-white font-pixel text-xl shadow-[inset_2px_2px_0px_rgba(255,255,255,0.4)] cursor-pointer">5</div>
            <div>
                <h1 class="font-sans font-bold tracking-tight text-lg text-white flex items-center gap-2 mc-shadow">
                    5조 '건설재해사례조사' <span class="text-[10px] bg-yellow-500 text-black font-pixel font-bold px-2 py-0.5 border border-black shadow-[1px_1px_0px_#000]">v5.0</span>
                </h1>
                <p class="text-[10px] text-zinc-400 uppercase tracking-widest font-pixel">SAFETY INTERACTIVE SIMULATOR</p>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <span id="bgm-status" class="text-[9px] text-zinc-500 bg-neutral-800 border border-neutral-600 px-2 py-1 font-pixel uppercase shadow-sm">🎵 BGM Off</span>
            <div class="text-xs font-pixel border-4 border-neutral-700 bg-black px-4 py-2 text-mc-textGreen mc-shadow">
                <span id="system-time">00:00:00</span>
            </div>
            <div onclick="openQrModal()" class="bg-zinc-300 p-1 border-4 border-zinc-600 shadow-[inset_-2px_-2px_0px_#555,inset_2px_2px_0px_#fff] flex items-center justify-center cursor-pointer hover:bg-white active:translate-y-0.5 transition-all">
                <img src="qrcode.png" alt="System QR" class="h-8 w-8 object-contain" onerror="this.style.display='none';">
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 space-y-6">
        <div class="text-center max-w-3xl mx-auto space-y-3 pt-4">
            <span class="text-xs font-bold text-mc-textYellow uppercase tracking-widest bg-zinc-900 border-2 border-zinc-700 px-3 py-1 shadow-md mc-shadow-yellow">[ 건설현장 핵심 10대 재해 사례 연구 ]</span>
            <h2 class="text-2xl md:text-3xl font-bold text-white tracking-tight mc-shadow">과거의 실패에서 배우는 안전 인프라 시뮬레이션</h2>
            <p class="text-sm text-zinc-300">원하는 재해 사례 블록을 클릭하면 안전 검사 콘솔이 인벤토리 창처럼 개방됩니다.</p>
        </div>

        <!-- 카드 그리드 생략 (기존과 동일) -->
        <!-- ... (기존 코드와 동일) ... -->

    </main>

    <script>
        // 배경음악 설정
        const bgmUrl = 'YOUR_AUDIO_FILE_URL'; // 여기에 깃허브 오디오 파일 경로를 넣으세요.
        const bgm = new Audio(bgmUrl);
        bgm.loop = true;
        let isBgmPlaying = false;

        function toggleBGM() {
            if (!isBgmPlaying) {
                bgm.play().catch(e => console.log("Playback prevented"));
                isBgmPlaying = true;
                document.getElementById('bgm-status').innerText = '🎵 BGM Active';
                document.getElementById('bgm-status').classList.replace('text-zinc-500', 'text-mc-textYellow');
            }
        }

        // 사용자의 첫 클릭 시 BGM 활성화
        window.addEventListener('click', toggleBGM, { once: true });

        // 효과음 (기존 엔진 유지)
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playClickSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(300, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.35, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12); 
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        }

        // 시간 업데이트 등 기타 함수 동일...
        function updateTime() { const now = new Date(); document.getElementById('system-time').innerText = now.toTimeString().split(' ')[0]; }
        setInterval(updateTime, 1000);
        updateTime();
        
        // ... navigateToPage, openQrModal 등 나머지 스크립트 그대로 유지 ...
    </script>
</body>
</html>
